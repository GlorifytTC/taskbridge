<!DOCTYPE html>
<html>
<head>
    <title>TaskBridge Login Test</title>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #4F46E5;
            text-align: center;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4F46E5;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #4338CA;
        }
        .btn-secondary {
            background: #10B981;
        }
        .btn-secondary:hover {
            background: #059669;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            word-break: break-all;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .url {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 TaskBridge</h1>
        <div class="url">
            🔗 Backend: taskbridge-production-9d91.up.railway.app
        </div>
        
        <input type="email" id="email" placeholder="Email" value="georgeglor@hotmail.com">
        <input type="password" id="password" placeholder="Password" value="Gladiatorman40">
        
        <button onclick="testLogin()">🔐 Login as Master</button>
        <button class="btn-secondary" onclick="testAdminLogin()">👔 Login as Admin</button>
        <button class="btn-secondary" onclick="testEmployeeLogin()">👥 Login as Employee</button>
        <button onclick="testHealth()">❤️ Test Health</button>
        
        <div id="result"></div>
    </div>

    <script>
        const BASE_URL = 'https://taskbridge-production-9d91.up.railway.app';
        const API_URL = `${BASE_URL}/api`;
        
        async function testHealth() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading">⏳ Testing health...</div>';
            
            try {
                const response = await fetch(`${BASE_URL}/health`);
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="result success">
                        ✅ Health Check Successful!<br>
                        Status: ${data.status}<br>
                        MongoDB: ${data.mongodb || 'Connected'}<br>
                        Time: ${data.timestamp}
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ Health Check Failed: ${error.message}
                    </div>
                `;
            }
        }
        
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<div class="loading">⏳ Logging in...</div>';
            
            try {
                console.log('Login attempt:', email);
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (response.ok && data.success) {
                    // Store token for testing
                    localStorage.setItem('test-token', data.token);
                    
                    resultDiv.innerHTML = `
                        <div class="result success">
                            ✅ LOGIN SUCCESSFUL! 🎉<br><br>
                            <strong>👤 Name:</strong> ${data.user.name}<br>
                            <strong>🔑 Role:</strong> ${data.user.role}<br>
                            <strong>📧 Email:</strong> ${data.user.email}<br>
                            <strong>🏢 Organization:</strong> ${data.user.organization?.name || 'N/A'}<br>
                            <strong>🆔 User ID:</strong> ${data.user.id}<br><br>
                            <strong>🔐 Token:</strong><br>
                            <code style="font-size: 10px;">${data.token.substring(0, 100)}...</code>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            ❌ Login Failed<br><br>
                            ${data.message || 'Unknown error'}<br>
                            Status: ${response.status}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ Network Error: ${error.message}<br><br>
                        Make sure backend is running at:<br>
                        ${BASE_URL}
                    </div>
                `;
            }
        }
        
        function testAdminLogin() {
            document.getElementById('email').value = 'admin@school.com';
            document.getElementById('password').value = 'Admin@123';
            testLogin();
        }
        
        function testEmployeeLogin() {
            document.getElementById('email').value = 'john@school.com';
            document.getElementById('password').value = 'Employee@123';
            testLogin();
        }
        
        // Auto-test health on load
        testHealth();
    </script>
</body>
</html>
