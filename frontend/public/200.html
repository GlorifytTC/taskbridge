<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TaskBridge</title>
</head>
<body>
  <div id="root"></div>
  <script>
    // Handle SPA routing
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <script src="/taskbridge/static/js/main.js"></script>
</body>
</html>
