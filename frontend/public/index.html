<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    
    <!-- ⭐ CRITICAL FOR GOOGLE SEARCH LOGO ⭐ -->
    <!-- Real image files - NOT data URIs -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    
    <!-- Apple Touch Icon (for iOS) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    
    <!-- ⭐ GOOGLE SEARCH CONSOLE VERIFICATION ⭐ -->
    <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" />
    
    <!-- Viewport and mobile settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TaskBridge" />
    
    <!-- ⭐ SEO Meta Tags ⭐ -->
    <title>TaskBridge - Smart Staff & Shift Management Platform</title>
    <meta name="description" content="TaskBridge - Smart Staff & Shift Management Platform for schools, hospitals, and organizations. Manage shifts, track attendance, and streamline communication." />
    <meta name="keywords" content="TaskBridge, workforce management, shift scheduling, employee management, attendance tracking, staff scheduling" />
    <meta name="author" content="GlorifyTC" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    
    <!-- AI Search Engine Meta Tags -->
    <meta name="GPTBot" content="index, follow" />
    <meta name="ChatGPT" content="index, follow" />
    <meta name="perplexity" content="index, follow" />
    
    <!-- ⭐ Open Graph / Social Media (CRITICAL for Google Search logo) ⭐ -->
    <meta property="og:title" content="TaskBridge - Smart Workforce Management" />
    <meta property="og:description" content="Manage shifts, track attendance, and streamline communication with ease." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://www.taskbridge.se/logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="https://www.taskbridge.se" />
    <meta property="og:site_name" content="TaskBridge" />
    <meta property="og:locale" content="sv_SE" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TaskBridge - Smart Workforce Management" />
    <meta name="twitter:description" content="Manage shifts, track attendance, and streamline communication with ease." />
    <meta name="twitter:image" content="https://www.taskbridge.se/logo.png" />
    
    <!-- ⭐ Structured Data (JSON-LD) for Knowledge Graph ⭐ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TaskBridge",
      "url": "https://www.taskbridge.se",
      "logo": "https://www.taskbridge.se/logo.png",
      "image": "https://www.taskbridge.se/logo.png",
      "description": "Smart Staff & Shift Management Platform for schools, hospitals, and organizations.",
      "sameAs": [
        "https://www.linkedin.com/company/taskbridge",
        "https://twitter.com/taskbridge"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "info@taskbridge.se",
        "contactType": "customer service"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "SE"
      }
    }
    </script>
    
    <!-- ⭐ WebSite Structured Data ⭐ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TaskBridge",
      "url": "https://www.taskbridge.se",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.taskbridge.se/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- ⭐ BreadcrumbList Structured Data ⭐ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [{
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://www.taskbridge.se"
      }]
    }
    </script>
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.taskbridge.se" />
    
    <!-- Alternate language versions -->
    <link rel="alternate" hreflang="en" href="https://www.taskbridge.se/en" />
    <link rel="alternate" hreflang="sv" href="https://www.taskbridge.se" />
    <link rel="alternate" hreflang="x-default" href="https://www.taskbridge.se" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>
    <noscript>
        <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif; background: #0f172a; color: white; min-height: 100vh;">
            <img src="/logo.png" alt="TaskBridge Logo" width="80" height="80" style="margin-bottom: 20px;" />
            <h1>TaskBridge</h1>
            <p>JavaScript is required to run this app.</p>
            <p>Please enable JavaScript in your browser settings.</p>
            <hr />
            <p>TaskBridge - Smart Workforce Management Platform</p>
            <p>Contact: info@taskbridge.se</p>
        </div>
    </noscript>
    <div id="root"></div>
</body>
</html>
